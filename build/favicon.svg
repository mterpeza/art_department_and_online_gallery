<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="50" cy="50" r="38" fill="#22c55e" opacity="0.35">
    <animate
      attributeName="r"
      values="32;48;32"
      dur="1.25s"
      repeatCount="indefinite"
    />
    <animate
      attributeName="opacity"
      values="0.12;0.55;0.12"
      dur="1.25s"
      repeatCount="indefinite"
    />
  </circle>

  <circle cx="50" cy="50" r="30" fill="#16a34a" filter="url(#glow)">
    <animate
      attributeName="r"
      values="27;35;27"
      dur="1.25s"
      repeatCount="indefinite"
    />
    <animate
      attributeName="opacity"
      values="0.76;1;0.76"
      dur="1.25s"
      repeatCount="indefinite"
    />
  </circle>
</svg>
